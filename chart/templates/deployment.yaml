apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jules-orchestrator.fullname" . }}
  labels:
    {{- include "jules-orchestrator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "jules-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jules-orchestrator.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          env:
            - name: JULES_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "jules-orchestrator.fullname" . }}-secrets
                  key: JULES_API_KEY
            - name: LLM_LOCAL_ENDPOINT
              value: "http://localhost:11434"
            - name: LLM_LOCAL_MODEL
              value: {{ .Values.ollama.model | quote }}
            - name: LLM_REMOTE_ENDPOINT
              value: "https://api.openai.com"
            - name: LLM_REMOTE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "jules-orchestrator.fullname" . }}-secrets
                  key: LLM_API_KEY
            - name: LLM_REMOTE_MODEL
              value: "gpt-4o"
            - name: DB_PATH
              value: "/app/data/tasks.db"
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
        {{- if .Values.ollama.enabled }}
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - name: ollama
              containerPort: 11434
              protocol: TCP
          volumeMounts:
            - name: ollama-storage
              mountPath: /root/.ollama
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: {{ include "jules-orchestrator.fullname" . }}-pvc
        {{- if .Values.ollama.enabled }}
        - name: ollama-storage
          persistentVolumeClaim:
            claimName: {{ include "jules-orchestrator.fullname" . }}-ollama-pvc
        {{- end }}
