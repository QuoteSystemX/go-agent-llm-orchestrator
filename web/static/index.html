<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jules Orchestrator Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <i data-lucide="cpu"></i>
                <h1>Jules <span>Orchestrator</span></h1>
            </div>
            <div class="header-actions">
                <button onclick="showSettings()"><i data-lucide="settings"></i> Telegram Setup</button>
                <div class="status-badge">
                    <span class="pulse"></span> System Online
                </div>
            </div>
        </header>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <h2><i data-lucide="send"></i> Telegram Bot Setup</h2>
                <p>Enter your Bot Token from <a href="https://t.me/botfather" target="_blank">@BotFather</a></p>
                <input type="text" id="bot-token" placeholder="Bot Token">
                
                <hr style="margin: 1.5rem 0; opacity: 0.1;">
                
                <h3><i data-lucide="brain"></i> LLM Models</h3>
                <div class="input-group">
                    <label>Local Model (Ollama)</label>
                    <input type="text" id="local-model" placeholder="phi3:mini">
                </div>
                <div class="input-group">
                    <label>Remote Model (OpenAI)</label>
                    <input type="text" id="remote-model" placeholder="gpt-4o">
                </div>
                
                <button onclick="saveAllSettings()">Save All Settings</button>
                
                <div id="qr-container" style="display:none; margin-top: 2rem; text-align: center;">
                    <p>Now scan this QR and press <b>/start</b> in Telegram:</p>
                    <canvas id="qrcode"></canvas>
                    <p id="bot-link" style="margin-top: 0.5rem;"></p>
                </div>
                <button class="close-btn" onclick="hideSettings()">Close</button>
            </div>
        </div>

        <main>
            <section class="task-section">
                <div class="section-header">
                    <h2><i data-lucide="list-todo"></i> Active Tasks</h2>
                </div>
                <div id="task-list" class="task-grid">
                    <!-- Tasks will be injected here -->
                </div>
            </section>

            <section class="audit-section">
                <div class="section-header">
                    <h2><i data-lucide="activity"></i> Audit Logs</h2>
                </div>
                <div class="audit-table-container">
                    <table id="audit-logs">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Session</th>
                                <th>Action</th>
                                <th>Details</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Logs will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
